<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Merkaba - Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B335E;--gold:#EFAE3C;--bg:#F6F7FB;--surface:#fff;--border:#E1E5EC;--text:#1B2333;--text-muted:#6B7280;--radius:14px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--gold);border-radius:var(--radius);padding:36px;max-width:400px;width:100%;text-align:center;box-shadow:0 4px 24px rgba(27,51,94,0.07);}
.icon{font-size:2.4rem;margin-bottom:16px;}
h1{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:var(--navy);margin-bottom:8px;}
p{color:var(--text-muted);font-size:0.9rem;line-height:1.6;}
.badge{display:inline-block;margin-top:20px;background:rgba(239,174,60,0.15);color:#7A5200;font-size:0.75rem;font-weight:700;padding:4px 12px;border-radius:999px;text-transform:uppercase;letter-spacing:0.05em;}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#128295;</div>
  <h1>Panel de Administrador</h1>
  <p>Aqui podras gestionar los clientes con acceso al kit: agregar nuevos, asignar contrasenas y ver el estado de cada cuenta.</p>
  <div class="badge">En construccion</div>
</div>
</body>
</html>

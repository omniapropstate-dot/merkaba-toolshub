<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Muestra gratis — Kit del Agente Inmobiliario Boliviano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#4A90D9; --navy-dark:#3272B0; --navy-soft:rgba(74,144,217,0.12);
  --gold:#EFAE3C; --gold-soft:rgba(239,174,60,0.15); --gold-rgb:239,174,60;
  --gold-light:#f5c842; --text-on-gold:#1a1306; --accent-text-muted:#7A5200;
  --pdf-navy:#1B335E; --pdf-navy-2:#243f72; --pdf-navy-soft:rgba(27,51,94,0.1);
  --bg:#0B1422; --surface:#101C30; --surface-2:#162438;
  --border:rgba(255,255,255,0.08);
  --text:rgba(238,245,255,0.94); --text-muted:rgba(175,200,240,0.58);
  --radius:14px; --radius-sm:9px;
}
*{box-sizing:border-box;}
[hidden]{display:none!important;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
.wrap{max-width:640px;margin:0 auto;padding:28px 18px 60px;}
.marca{display:flex;flex-direction:column;align-items:center;margin-bottom:24px;text-align:center;}
.marca-nombre{font-family:'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:700;color:#fff;}
.marca-tagline{font-size:0.68rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.14em;margin-top:2px;}
.nombre-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px;}
.nombre-box label{font-size:0.8rem;font-weight:600;color:var(--text-muted);display:block;margin-bottom:6px;}
.nombre-box input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface-2);color:var(--text);font-family:'Inter',sans-serif;font-size:0.92rem;}

.tool-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;}
.tool-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px;}
.tool-icon{width:40px;height:40px;border-radius:10px;background:var(--navy-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;}
.tool-icon.gold{background:var(--gold-soft);}
.tool-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:var(--navy);}
.tool-subtitle{font-size:0.82rem;color:var(--text-muted);margin-top:2px;}
.form-row{display:grid;gap:12px;margin-bottom:16px;}
.form-row.cols-2{grid-template-columns:1fr 1fr;}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:600px){.form-row.cols-2,.form-row.cols-3{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:0.82rem;font-weight:600;color:var(--text-muted);}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:'Inter',sans-serif;color:var(--text);background:var(--surface-2);}
.form-group textarea{resize:vertical;min-height:70px;}
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-weight:700;font-size:0.88rem;cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:filter .15s,transform .15s;text-decoration:none;display:inline-block;}
.btn:active{transform:scale(0.96);}
.btn-primary{background:var(--navy);color:#fff;}
.btn-gold{background:var(--gold);color:var(--text-on-gold);}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-sm{padding:8px 14px;font-size:0.82rem;}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.result-box{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius-sm);padding:16px;margin-top:16px;}
.result-box.navy-accent{border-left-color:var(--navy);}
.result-label{font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.result-text{font-size:0.9rem;line-height:1.7;color:var(--text);white-space:pre-wrap;}

.planes-title{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:700;color:#fff;text-align:center;margin:36px 0 6px;}
.planes-sub{font-size:0.85rem;color:var(--text-muted);text-align:center;margin-bottom:22px;}
.planes-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:560px){.planes-grid{grid-template-columns:1fr;}}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;}
.plan-card.destacado{border-color:var(--gold);}
.plan-nombre{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:#fff;}
.plan-precio{font-family:'Space Grotesk',sans-serif;font-size:1.7rem;font-weight:700;color:var(--gold);margin:6px 0 2px;}
.plan-badge{display:inline-block;background:var(--gold-soft);color:var(--gold);font-size:0.68rem;font-weight:700;padding:3px 10px;border-radius:999px;margin-bottom:12px;}
.plan-toggle{width:100%;text-align:left;background:none;border:none;border-top:1px solid var(--border);padding:12px 0 0;margin-top:4px;color:var(--text-muted);font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;}
.plan-carrusel-wrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .35s ease;}
.plan-carrusel-inner{overflow:hidden;}
.plan-list{list-style:none;padding:10px 2px 2px;margin:0;display:flex;flex-direction:column;gap:7px;}
.plan-list li{font-size:0.78rem;color:var(--text-muted);line-height:1.4;padding-left:19px;position:relative;}
.plan-list li::before{content:'✓';position:absolute;left:0;top:0;color:var(--gold);font-weight:700;}
.plan-list li.lead{font-style:italic;font-size:0.76rem;padding-left:0;}
.plan-list li.lead::before{content:'';}
/* carrusel de categorias — cinta continua que se desliza sola, mismo patron que el de la landing (mkt-marquee) */
.mkt-marquee{position:relative;width:100%;overflow:hidden;padding:14px 0 2px;margin-top:6px;border-top:1px solid var(--border);}
.mkt-track{display:flex;gap:10px;width:max-content;animation:mktScroll 20s linear infinite;}
@keyframes mktScroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.mkt-card{flex-shrink:0;width:96px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border:1px solid var(--border);border-radius:12px;background:var(--surface-2);text-align:center;}
.mkt-ico{color:var(--gold);display:inline-flex;}
.mkt-ico svg{width:18px;height:18px;}
.mkt-count{font-family:'Space Grotesk',sans-serif;font-weight:700;color:#fff;font-size:0.9rem;}
.mkt-name{font-size:0.6rem;color:var(--text-muted);line-height:1.2;}
@media(prefers-reduced-motion:reduce){.mkt-track{animation:none;}}
.plan-btn{display:block;text-align:center;margin-top:16px;width:100%;}
.whatsapp-caja{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-top:24px;}
.whatsapp-caja .icono{font-size:1.6rem;flex-shrink:0;}
.whatsapp-texto{flex:1;font-size:0.82rem;color:var(--text);line-height:1.5;}
.whatsapp-texto b{display:block;color:#fff;}
.btn-whatsapp{display:inline-flex;align-items:center;gap:6px;text-decoration:none;white-space:nowrap;background:#25D366;color:#04250f;font-weight:700;font-size:0.82rem;padding:9px 16px;border-radius:999px;}
.mk-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0a1628;color:#fff;padding:10px 18px;border-radius:10px;font-size:0.82rem;z-index:999;border:1px solid var(--gold);}
</style>
</head>
<body>
<div class="wrap">
  <div class="marca">
    <div class="marca-nombre">Kit del Agente Inmobiliario Boliviano</div>
    <div class="marca-tagline">Muestra gratis · Merkaba</div>
  </div>

  <div class="nombre-box">
    <label>Tu nombre (aparece en el resultado)</label>
    <input type="text" id="mk-nombre-input" placeholder="Ej: Juan Pérez" oninput="actualizarNombre()"/>
  </div>

  <div id="contenido"></div>

  <div id="planes"></div>

  <div class="whatsapp-caja">
    <div class="icono">💬</div>
    <div class="whatsapp-texto"><b>¿Tenés dudas?</b>Escribinos directo por WhatsApp.</div>
    <a class="btn-whatsapp" href="#" onclick="abrirSoporteWA();return false;">💬 WhatsApp</a>
  </div>
</div>

<div class="mk-toast" id="mk-toast" hidden></div>

<script>
// ══════════════════════════════════════════════
// UTILIDADES BASICAS (mismo patron que 02-utilidades.js del kit real)
// ══════════════════════════════════════════════
function $(id){ return document.getElementById(id); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg){ var t=$('mk-toast'); if(!t) return; t.textContent=msg; t.hidden=false; clearTimeout(t._t); t._t=setTimeout(function(){t.hidden=true;},2500); }
function copiar(texto){
  navigator.clipboard.writeText(texto).then(function(){ toast('Copiado al portapapeles ✓'); }).catch(function(){
    var ta=document.createElement('textarea'); ta.value=texto; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('Copiado ✓');
  });
}
function abrirWhatsApp(texto){ window.open('https://wa.me/?text='+encodeURIComponent(texto),'_blank'); }
function badgesHerramienta(){ return ''; } // acá no hay etapas/tipos, no aplica

const SOPORTE_WHATSAPP = '59169638816';
function abrirSoporteWA(){
  window.open('https://wa.me/'+SOPORTE_WHATSAPP+'?text='+encodeURIComponent('Hola! Vi la muestra gratis del Kit del Agente Inmobiliario y tengo una consulta.'), '_blank');
}

// ══════════════════════════════════════════════
// AGENTE — solo el nombre es personalizable (regla ya acordada para esta familia de paginas)
// ══════════════════════════════════════════════
var AGENTE = { nombre:'Agente', ciudad:'Bolivia', whatsapp:'', email:'' };
function actualizarNombre(){ AGENTE.nombre = $('mk-nombre-input').value.trim() || 'Agente'; }

// ══════════════════════════════════════════════
// HERRAMIENTA 1 — FILTRO: ¿COMPRADOR REAL O MIRON? (tal cual 06-tools-interesados.js)
// ══════════════════════════════════════════════
function toolFiltroComprador(){
  const preguntas = [
    {q:'¿Para cuándo necesitas mudarte o concretar la operación?', a:['En menos de 1 mes','En 1 a 3 meses','Sin urgencia, estoy explorando']},
    {q:'¿Ya definiste el presupuesto máximo?', a:['Sí, tengo el monto claro','Tengo un rango aproximado','No, todavía no sé cuánto gastar']},
    {q:'¿Cómo financiarás la compra?', a:['Efectivo disponible','Crédito hipotecario aprobado','Crédito hipotecario en trámite','Aún no lo he definido']},
    {q:'¿Has visto otras propiedades recientemente?', a:['Sí, he visitado varias','He visto algunas','No, esta es la primera']},
    {q:'¿Quién toma la decisión final de compra?', a:['Yo solo','Yo y mi pareja/familia','Depende de financiamiento o terceros']},
  ];
  let html = `<div class="tool-section" id="tool-filtro">
    <div class="tool-header">
      <div class="tool-icon">🔍</div>
      <div><div class="tool-title">Filtro: ¿comprador real o mirón? (antes de la visita)</div>
      <div class="tool-subtitle">Antes de mostrar la propiedad, usa estas preguntas para saber si el interesado realmente puede y quiere comprar. Así no pierdes tiempo.</div></div>
    </div>
    ${badgesHerramienta('filtro-comprador')}
    <p style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;">Marca las respuestas del interesado para ver su perfil de comprador.</p>
    <div id="filtro-preguntas">`;

  preguntas.forEach((p,i)=>{
    html += `<div style="margin-bottom:16px;padding:14px;background:var(--surface-2);border-radius:var(--radius-sm);">
      <div style="font-size:0.88rem;font-weight:600;color:var(--navy);margin-bottom:10px;">${i+1}. ${p.q}</div>`;
    p.a.forEach((a,j)=>{
      html += `<label style="display:flex;align-items:center;gap:8px;font-size:0.83rem;color:var(--text);margin-bottom:6px;cursor:pointer;">
        <input type="radio" name="filtro-${i}" value="${j}" style="accent-color:var(--navy);" onchange="evaluarFiltro()"> ${a}
      </label>`;
    });
    html += `</div>`;
  });

  html += `</div>
    <div id="filtro-resultado" hidden>
      <div class="result-box" id="filtro-resultado-box">
        <div class="result-label">Perfil del comprador</div>
        <div class="result-text" id="filtro-texto"></div>
      </div>
    </div>
  </div>`;
  return html;
}

function evaluarFiltro(){
  const vals = [];
  for(let i=0;i<5;i++){
    const sel = document.querySelector(`input[name="filtro-${i}"]:checked`);
    if(sel) vals.push(parseInt(sel.value));
  }
  if(vals.length<3) return;
  const score = vals.reduce((s,v)=>s+(v===0?2:v===1?1:0),0);
  let perfil='', consejo='';
  if(score>=7){ perfil='🟢 Comprador serio'; consejo='Coordina la visita cuanto antes. Tiene urgencia, presupuesto definido y capacidad de decisión. No lo hagas esperar.'; }
  else if(score>=4){ perfil='🟡 Interesado potencial'; consejo='Vale la pena seguir conversando. Confirma el presupuesto y el financiamiento antes de agendar la visita para asegurarte de que es viable.'; }
  else{ perfil='🔴 Mirón o explorador temprano'; consejo='No coordines una visita aún. Mantén el contacto, compártele información general y vuelve a calificarlo en 2-3 semanas cuando su situación haya avanzado.'; }
  $('filtro-texto').textContent = perfil+'\n\n'+consejo;
  $('filtro-resultado').hidden = false;
}

// ══════════════════════════════════════════════
// HERRAMIENTA 2 — GENERADOR DE SEGUIMIENTO (tal cual 04-tools-calculadoras.js)
// ══════════════════════════════════════════════
function toolGeneradorSeguimiento(){
  return `<div class="tool-section" id="tool-seguimiento">
    <div class="tool-header">
      <div class="tool-icon gold">💬</div>
      <div><div class="tool-title">Generador de seguimiento</div>
      <div class="tool-subtitle">La mayoría de ventas requiere varios contactos antes de cerrarse. Genera aquí el mensaje exacto según en qué momento estás con el cliente.</div></div>
    </div>
    ${badgesHerramienta('generador-seguimiento')}
    <div class="form-row cols-2">
      <div class="form-group"><label>Nombre del cliente</label><input id="seg-nombre" type="text" placeholder="María Quispe"/></div>
      <div class="form-group"><label>Propiedad que visitó</label><input id="seg-propiedad" type="text" placeholder="Dpto. 3 amb. en Sopocachi"/></div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group"><label>¿Cuánto tiempo pasó desde la visita?</label>
        <select id="seg-tiempo">
          <option value="1dia">1 día</option>
          <option value="3dias">3 días</option>
          <option value="1semana">1 semana</option>
          <option value="2semanas">2 semanas</option>
          <option value="1mes">1 mes</option>
          <option value="2a3meses">2-3 meses</option>
          <option value="6meses">6 meses</option>
          <option value="mas1anio">Más de 1 año</option>
        </select>
      </div>
      <div class="form-group"><label>¿Qué dijo al finalizar la visita?</label>
        <select id="seg-reaccion">
          <option value="positivo">Le gustó, quedó en pensar</option>
          <option value="precio">Le interesó pero el precio le pareció alto</option>
          <option value="otro">Dijo que tiene otro inmueble en vista</option>
          <option value="frio">No dio señales claras</option>
          <option value="esposo">Quiere consultar con su pareja/familia</option>
        </select>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px;">
      <label>¿Hay algo nuevo que puedas compartirle? (opcional)</label>
      <input id="seg-novedad" type="text" placeholder="Ej: el propietario aceptaría negociar el precio, hay otra propiedad similar…"/>
    </div>
    <div class="btn-group">
      <button class="btn btn-gold" onclick="generarSeguimiento()">Generar mensaje</button>
    </div>
    <div id="seg-resultado" hidden>
      <div class="result-box">
        <div class="result-label">Tu mensaje de seguimiento</div>
        <div class="result-text" id="seg-texto"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary btn-sm" onclick="copiar(document.getElementById('seg-texto').textContent)">📋 Copiar</button>
        <button class="btn btn-outline btn-sm" onclick="abrirWhatsApp(document.getElementById('seg-texto').textContent)">💬 Abrir en WhatsApp</button>
      </div>
    </div>
  </div>`;
}

function generarSeguimiento(){
  const nombre = $('seg-nombre').value.trim() || 'el cliente';
  const propiedad = $('seg-propiedad').value.trim() || 'la propiedad';
  const tiempo = $('seg-tiempo').value;
  const reaccion = $('seg-reaccion').value;
  const novedad = $('seg-novedad').value.trim();
  const agente = AGENTE.nombre;

  const saludos = {'1dia':'Hola', '3dias':'Hola', '1semana':'Hola, espero que estés bien', '2semanas':'Hola, espero que estés bien', '1mes':'Hola, ¿cómo estás?', '2a3meses':'Hola, hace tiempo no hablamos', '6meses':'Hola, ha pasado tiempo', 'mas1anio':'Hola, ha pasado bastante tiempo'};
  const saludo = saludos[tiempo];

  let cuerpo = '';
  if(reaccion==='positivo') cuerpo = `Quería saber si pudiste reflexionar sobre ${propiedad} que visitamos. Si tienes alguna pregunta o te gustaría visitarla de nuevo, estoy disponible para coordinar.`;
  else if(reaccion==='precio') cuerpo = `Quería comentarte que he podido conversar con el propietario de ${propiedad} y hay posibilidad de negociar. Si te interesa retomarlo, con gusto coordinamos.`;
  else if(reaccion==='otro') cuerpo = `Quería saber cómo avanzó tu búsqueda. Si el otro inmueble no terminó de convencerte, ${propiedad} sigue disponible y el propietario está abierto a conversar.`;
  else if(reaccion==='frio') cuerpo = `Pasaron unos días desde que visitamos ${propiedad} y quería saber si surgió alguna duda o necesitas más información para tomar una decisión.`;
  else cuerpo = `¿Pudiste conversar con tu familia sobre ${propiedad}? Quería saber si llegaron a una conclusión o si necesitan ver la propiedad nuevamente.`;

  let novedadTexto = '';
  if(novedad) novedadTexto = `\n\nAdemás, quería contarte que ${novedad}.`;

  const mensaje = `${saludo}, ${nombre}. Soy ${agente}.\n\n${cuerpo}${novedadTexto}\n\nQuedo a tu disposición.\n\n📱 ${AGENTE.nombre}`;

  $('seg-texto').textContent = mensaje;
  $('seg-resultado').hidden = false;
}

// ══════════════════════════════════════════════
// HERRAMIENTA 3 — FICHA DE PROPIEDAD (tal cual 05-tools-propiedad.js)
// ══════════════════════════════════════════════
function toolFichaPropiedad(){
  return `<div class="tool-section" id="tool-ficha">
    <div class="tool-header">
      <div class="tool-icon">🏠</div>
      <div><div class="tool-title">Generador de ficha de propiedad</div>
      <div class="tool-subtitle">Completa los datos de la propiedad y genera una publicación lista para pegar en Facebook, UltraCasas o InfoCasas.</div></div>
    </div>
    ${badgesHerramienta('ficha-propiedad')}
    <div class="form-row cols-2">
      <div class="form-group"><label>Tipo de operación</label>
        <select id="ficha-op"><option>Venta</option><option>Alquiler</option><option>Anticrético</option></select>
      </div>
      <div class="form-group"><label>Tipo de inmueble</label>
        <select id="ficha-tipo"><option>Departamento</option><option>Casa</option><option>Terreno</option><option>Local comercial</option><option>Oficina</option></select>
      </div>
    </div>
    <div class="form-row cols-2">
      <div class="form-group"><label>Zona / barrio</label><input id="ficha-zona" type="text" placeholder="Sopocachi, La Paz"/></div>
      <div class="form-group"><label>Precio</label><input id="ficha-precio" type="text" placeholder="$ 85,000 o Bs. 50,000/mes"/></div>
    </div>
    <div class="form-row cols-3">
      <div class="form-group"><label>Dormitorios</label><input id="ficha-dorm" type="number" placeholder="3"/></div>
      <div class="form-group"><label>Baños</label><input id="ficha-baños" type="number" placeholder="2"/></div>
      <div class="form-group"><label>Superficie (m²)</label><input id="ficha-m2" type="number" placeholder="120"/></div>
    </div>
    <div class="form-row cols-3">
      <div class="form-group"><label>Garaje</label>
        <select id="ficha-garaje">
          <option value="">No</option><option>1 garaje</option><option>2 garajes</option><option>Más de 2</option>
        </select>
      </div>
      <div class="form-group"><label>Antigüedad (años)</label><input id="ficha-antiguedad" type="number" placeholder="Ej: 5"/></div>
      <div class="form-group"><label>Expensas (Bs/mes)</label><input id="ficha-expensas" type="number" placeholder="Si aplica"/></div>
    </div>
    <div class="form-group" style="margin-bottom:12px;">
      <label>Características destacadas (una por línea)</label>

var _fotosPropiedad = [];

function _normalizePhoto(dataUrl, callback){
  var img = new Image();
  img.onload = function(){
    var tw = 480, th = 320;
    var scale = Math.min(tw / img.width, th / img.height);
    var dw = Math.round(img.width * scale);
    var dh = Math.round(img.height * scale);
    var dx = Math.round((tw - dw) / 2);
    var dy = Math.round((th - dh) / 2);
    var cv = document.createElement('canvas');
    cv.width = tw; cv.height = th;
    var ctx = cv.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, tw, th);
    ctx.drawImage(img, dx, dy, dw, dh);
    callback(cv.toDataURL('image/jpeg', 0.88));
  };
  img.src = dataUrl;
}

function cargarFotosPropiedad(input){
  var files = Array.from(input.files).slice(0, 6);
  _fotosPropiedad = new Array(files.length);
  var preview = $('ficha-fotos-preview');
  if(preview) preview.innerHTML = '';
  files.forEach(function(file, i){
    var reader = new FileReader();
    reader.onload = function(e){
      _normalizePhoto(e.target.result, function(croppedUrl){
        _fotosPropiedad[i] = croppedUrl;
        if(preview){
          var img = document.createElement('img');
          img.src = croppedUrl;
          img.style.cssText = 'width:72px;height:54px;object-fit:fill;border-radius:6px;border:2px solid var(--gold);';
          preview.appendChild(img);
        }
      });
    };
    reader.readAsDataURL(file);
  });
}

const DOC_INICIO = '<!DOCTYPE html><html><head><meta charset="UTF-8"/></head><body style="margin:0;padding:0;font-family:Segoe UI,Arial,sans-serif;background:#fff;">';

function _loadScript(src){
  return new Promise(function(resolve, reject){
    var s = document.createElement('script');
    s.src = src;
    s.onload = function(){ setTimeout(resolve, 80); };
    s.onerror = function(){ reject(new Error('No se pudo cargar: ' + src)); };
    document.head.appendChild(s);
  });
}

async function _loadLibs(){
  if(!window.jspdf || !window.jspdf.jsPDF){
    await _loadScript('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js');
  }
  if(!window.html2canvas){
    await _loadScript('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js');
  }
}

function descargarBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename; a.style.display = 'none';
  document.body.appendChild(a); a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
}

function _findBestCut(canvas, naturalCutY, minY){
  var ctx = canvas.getContext('2d');
  var bestY = naturalCutY;
  var bestScore = -1;
  for(var y = naturalCutY; y >= minY; y -= 2){
    var data = ctx.getImageData(0, y, canvas.width, 1).data;
    var white = 0;
    for(var i = 0; i < data.length; i += 4){
      if(data[i] > 238 && data[i+1] > 238 && data[i+2] > 238) white++;
    }
    var score = white / (canvas.width);
    if(score > bestScore){ bestScore = score; bestY = y; }
    if(score > 0.97) break;
  }
  return bestY;
}

async function renderPDF(htmlContent, filename){
  var jsPDF = window.jspdf.jsPDF;
  var wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;z-index:-1;';
  wrap.innerHTML = htmlContent;
  document.body.appendChild(wrap);
  try {
    var canvas = await html2canvas(wrap, {
      scale: 2,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#ffffff',
      logging: false,
      width: 794,
      windowWidth: 794
    });
    var pdf = new jsPDF({ orientation:'portrait', unit:'px', format:'a4', compress:true });
    var pageW = pdf.internal.pageSize.getWidth();
    var pageH = pdf.internal.pageSize.getHeight();
    var scale = pageW / (canvas.width / 2);
    var pageHpx = Math.round(pageH / scale * 2);
    var currentY = 0;
    var firstPage = true;
    while(currentY < canvas.height){
      var naturalCut = currentY + pageHpx;
      var cutY;
      if(naturalCut >= canvas.height){
        cutY = canvas.height;
      } else {
        var searchMin = currentY + Math.round(pageHpx * 0.78);
        cutY = _findBestCut(canvas, naturalCut, searchMin);
      }
      var sliceH = cutY - currentY;
      var sliceCanvas = document.createElement('canvas');
      sliceCanvas.width = canvas.width;
      sliceCanvas.height = sliceH;
      var ctx = sliceCanvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, sliceH);
      ctx.drawImage(canvas, 0, currentY, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
      if(!firstPage) pdf.addPage();
      firstPage = false;
      var displayH = (sliceH / 2) * scale;
      pdf.addImage(sliceCanvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, pageW, displayH);
      currentY = cutY;
    }
    descargarBlob(pdf.output('blob'), filename);
    toast('PDF descargado.');
  } finally {
    document.body.removeChild(wrap);
  }
}

    + '<button class="plan-toggle" onclick="togglePlanAcc(\''+idAcc+'\')">Ver las '+total+' herramientas incluidas ▾</button>'
    + '<div class="plan-carrusel-wrap" id="'+idAcc+'"><div class="plan-carrusel-inner">'
    +   '<ul class="plan-list">'+bulletsHtml+'</ul>'
    +   '<div class="mkt-marquee" aria-hidden="true"><div class="mkt-track" id="'+idTrack+'"></div></div>'
    + '</div></div>'
    + '</div>';
}

function renderPlanes(){
  var msgProfesional = 'Hola! Vi la muestra gratis y quiero el Plan Profesional del Kit del Agente Inmobiliario.';
  var msgEsencial = 'Hola! Vi la muestra gratis y quiero el Plan Esencial del Kit del Agente Inmobiliario.';
  $('planes').innerHTML =
    '<div class="planes-title">¿Te gustó? Esto es solo 1 de las 25 herramientas del kit completo</div>'
    + '<div class="planes-sub">Pago único, sin mensualidades</div>'
    + '<div class="planes-grid">'
    + planCard('Plan Profesional', '350', true, DESGLOSE.profesional, BULLETS_PROFESIONAL, 'Todo lo del plan Esencial, más:', msgProfesional)
    + planCard('Plan Esencial', '250', false, DESGLOSE.esencial, BULLETS_ESENCIAL, '', msgEsencial)
    + '</div>';
  buildTrack('track-planprofesional', DESGLOSE.profesional);
  buildTrack('track-planesencial', DESGLOSE.esencial);
}

// ══════════════════════════════════════════════
// RUTEO POR QUERY STRING (?ver=filtro|seguimiento|ficha)
// ══════════════════════════════════════════════
function mostrarPorQuery(){
  var params = new URLSearchParams(location.search);
  var ver = params.get('ver') || 'filtro';
  var html;
  if(ver === 'seguimiento') html = toolGeneradorSeguimiento();
  else if(ver === 'ficha') html = toolFichaPropiedad();
  else html = toolFiltroComprador();
  $('contenido').innerHTML = html;
}

actualizarNombre();
mostrarPorQuery();
renderPlanes();
</script>
</body>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kit del Agente Inmobiliario Boliviano</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1B335E; --navy-dark:#142546; --navy-soft:rgba(27,51,94,0.08);
  --gold:#EFAE3C; --gold-soft:rgba(239,174,60,0.15);
  --bg:#F6F7FB; --surface:#FFFFFF; --surface-2:#EEF1F6;
  --border:#E1E5EC; --border-strong:#C8CEDB;
  --text:#1B2333; --text-muted:#6B7280; --text-light:#9CA3AF;
  --success:#2F9E6E; --success-soft:rgba(47,158,110,0.12);
  --radius:14px; --radius-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
[hidden]{display:none!important;}
html,body{min-height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.5;}

/* ── HEADER ── */
.kit-header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px clamp(16px,4vw,48px);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;}
.kit-header img{height:36px;width:auto;}
.kit-header-title{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--navy);}
.kit-header-title span{color:var(--text-muted);font-weight:500;}
.kit-header .spacer{flex:1;}
.agent-badge{background:var(--navy-soft);border-radius:999px;padding:6px 14px;font-size:0.8rem;color:var(--navy);font-weight:600;}

/* ── LAYOUT ── */
.kit-body{display:flex;min-height:calc(100vh - 65px);}

/* ── SIDEBAR ── */
.sidebar{width:260px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto;}
.sidebar-phase{margin-bottom:4px;}
.phase-btn{width:100%;text-align:left;padding:8px 20px;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.78rem;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;display:flex;align-items:center;gap:8px;}
.phase-btn:hover{color:var(--navy);}
.phase-btn .phase-num{background:var(--surface-2);border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;}
.phase-btn.active .phase-num{background:var(--navy);color:#fff;}
.tool-links{padding:0;}
.tool-link{display:block;width:100%;text-align:left;padding:7px 20px 7px 48px;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-size:0.82rem;color:var(--text-muted);border-left:2px solid transparent;}
.tool-link:hover{color:var(--navy);background:var(--navy-soft);}
.tool-link.active{color:var(--navy);font-weight:600;border-left-color:var(--gold);background:var(--gold-soft);}

/* ── MAIN CONTENT ── */
.kit-main{flex:1;padding:clamp(20px,4vw,40px);max-width:860px;}

/* ── MAPA DEL PROCESO ── */
.mapa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:32px;}
.mapa-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--navy);border-radius:var(--radius);padding:16px;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.mapa-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(27,51,94,0.1);}
.mapa-card.gold{border-top-color:var(--gold);}
.mapa-num{font-size:0.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:4px;}
.mapa-name{font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;color:var(--navy);margin-bottom:4px;}
.mapa-desc{font-size:0.78rem;color:var(--text-muted);}
.mapa-tools{font-size:0.72rem;color:var(--gold);font-weight:600;margin-top:6px;}

/* ── SECCIÓN HERRAMIENTA ── */
.tool-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:20px;}
.tool-section:last-child{margin-bottom:0;}
.tool-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:20px;}
.tool-icon{width:40px;height:40px;border-radius:10px;background:var(--navy-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1.2rem;}
.tool-icon.gold{background:var(--gold-soft);}
.tool-title{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;color:var(--navy);}
.tool-subtitle{font-size:0.82rem;color:var(--text-muted);margin-top:2px;}
.tool-badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;margin-left:8px;}
.badge-hace{background:var(--navy-soft);color:var(--navy);}
.badge-guia{background:var(--gold-soft);color:#7A5200;}
.badge-ordena{background:var(--success-soft);color:#1A6645;}

/* ── FORMULARIO ── */
.form-row{display:grid;gap:12px;margin-bottom:16px;}
.form-row.cols-2{grid-template-columns:1fr 1fr;}
.form-row.cols-3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:600px){.form-row.cols-2,.form-row.cols-3{grid-template-columns:1fr;}}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-size:0.82rem;font-weight:600;color:var(--text-muted);}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:'Inter',sans-serif;color:var(--text);background:var(--surface-2);}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--navy);outline-offset:1px;}
.form-group textarea{resize:vertical;min-height:80px;}

/* ── BOTONES ── */
.btn{padding:10px 20px;border-radius:var(--radius-sm);font-weight:700;font-size:0.88rem;cursor:pointer;font-family:'Inter',sans-serif;border:none;transition:filter .15s;}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover{filter:brightness(1.15);}
.btn-gold{background:var(--gold);color:#1a1306;}
.btn-gold:hover{filter:brightness(1.08);}
.btn-outline{background:none;border:1px solid var(--border);color:var(--text-muted);}
.btn-outline:hover{border-color:var(--navy);color:var(--navy);}
.btn-sm{padding:7px 14px;font-size:0.8rem;}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}

/* ── RESULTADO ── */
.result-box{background:var(--surface-2);border:1px solid var(--border);border-left:3px solid var(--gold);border-radius:var(--radius-sm);padding:16px;margin-top:16px;}
.result-box.navy-accent{border-left-color:var(--navy);}
.result-label{font-size:0.75rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:8px;}
.result-text{font-size:0.9rem;line-height:1.7;color:var(--text);white-space:pre-wrap;}
.result-number{font-family:'Space Grotesk',sans-serif;font-size:1.8rem;font-weight:700;color:var(--navy);}
.result-number span{font-size:1rem;font-weight:500;color:var(--text-muted);}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-top:12px;}
.result-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;}
.result-item-label{font-size:0.72rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.result-item-value{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-top:2px;}

/* ── CHECKLIST ── */
.checklist{list-style:none;}
.checklist li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.checklist li:last-child{border-bottom:none;}
.checklist input[type="checkbox"]{width:18px;height:18px;flex-shrink:0;margin-top:1px;accent-color:var(--navy);}
.checklist-text{font-size:0.88rem;color:var(--text);}
.checklist-text.checked{text-decoration:line-through;color:var(--text-muted);}
.checklist-tag{display:inline-block;font-size:0.68rem;padding:1px 6px;border-radius:4px;font-weight:600;margin-left:6px;}
.tag-obligatorio{background:#FDECEA;color:#991B1B;}
.tag-importante{background:var(--gold-soft);color:#7A5200;}

/* ── BANCO DE SCRIPTS ── */
.scripts-grid{display:grid;gap:10px;}
.script-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;}
.script-situation{font-size:0.75rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.script-text{font-size:0.86rem;color:var(--text);line-height:1.6;}
.script-copy{float:right;margin-top:-2px;}

/* ── GUÍA ── */
.guide-steps{display:flex;flex-direction:column;gap:12px;}
.guide-step{display:flex;gap:14px;padding:14px;background:var(--surface-2);border-radius:var(--radius-sm);}
.guide-step-num{width:28px;height:28px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;flex-shrink:0;}
.guide-step-content h4{font-size:0.88rem;font-weight:700;color:var(--navy);margin-bottom:4px;}
.guide-step-content p{font-size:0.82rem;color:var(--text-muted);line-height:1.5;}
.guide-alert{background:#FEF9EC;border:1px solid var(--gold);border-radius:var(--radius-sm);padding:12px 14px;font-size:0.82rem;color:#7A5200;margin-top:12px;}
.guide-alert strong{display:block;margin-bottom:2px;}

/* ── DESCARGABLES ── */
.download-card{display:flex;align-items:center;gap:14px;padding:14px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px;}
.download-icon{font-size:1.6rem;flex-shrink:0;}
.download-info h4{font-size:0.9rem;font-weight:700;color:var(--navy);}
.download-info p{font-size:0.78rem;color:var(--text-muted);}
.download-info{flex:1;}

/* ── DIVIDER ── */
.phase-divider{font-family:'Space Grotesk',sans-serif;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:20px;margin-top:32px;display:flex;align-items:center;gap:10px;}
.phase-divider:first-child{margin-top:0;}
.phase-divider span{background:var(--navy);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0;}
.phase-divider.gold span{background:var(--gold);color:#1a1306;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy-dark);color:#fff;padding:10px 22px;border-radius:999px;font-size:0.85rem;z-index:200;box-shadow:0 4px 16px rgba(0,0,0,0.2);}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none;}
  .kit-main{padding:16px;}
}

/* MOBILE MENU */
.hamburger-btn{display:none;background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--navy);padding:4px 8px;border-radius:6px;line-height:1;}
.hamburger-btn:hover{background:var(--navy-soft);}
.mobile-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:150;}
.mobile-overlay.open{display:block;}
.mobile-sidebar{position:fixed;top:0;left:-290px;width:280px;height:100vh;background:var(--surface);z-index:200;transition:left .22s ease;overflow-y:auto;box-shadow:4px 0 24px rgba(0,0,0,0.18);}
.mobile-sidebar.open{left:0;}
.mobile-sidebar-top{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);}
.mobile-close-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--text-muted);}
@media(max-width:768px){.hamburger-btn{display:flex!important;}.sidebar{display:none!important;}}
/* PERFIL MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:300;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal-box{background:var(--surface);border-radius:var(--radius);padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2);}
.modal-box h2{font-family:'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:700;color:var(--navy);margin-bottom:4px;}
.modal-sub{font-size:0.82rem;color:var(--text-muted);margin-bottom:20px;}
.photo-ring{width:72px;height:72px;border-radius:50%;border:3px solid var(--border);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;overflow:hidden;}
.photo-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.photo-wrap{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
/* HEADER EXTRAS */
.logout-kit-btn{background:none;border:1px solid var(--border);color:var(--text-muted);font-size:0.78rem;padding:5px 12px;border-radius:999px;cursor:pointer;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0;}
.logout-kit-btn:hover{color:#c0392b;border-color:#c0392b;}
.agent-badge{cursor:pointer;}
.agent-badge:hover{background:var(--gold-soft);color:#7A5200;}
/* PRINT */
@media print{
  .kit-header,.sidebar,.btn-group,.phase-divider,.mapa-grid,nav,button,.hamburger-btn,.logout-kit-btn,.no-print{display:none!important;}
  .kit-body{display:block;}.kit-main{padding:0;max-width:100%;}
  .tool-section{border:none;padding:0;box-shadow:none;}.result-box{border:1px solid #ccc;}
  #prop-formulario,.form-row,.form-group{display:none!important;}
}
</style>
</head>
<body>

<header class="kit-header">
  <button class="hamburger-btn" onclick="toggleMobileMenu()" title="Menu">&#9776;</button>
  <div style="width:32px;height:32px;background:var(--navy);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
    <svg width="18" height="18" viewBox="0 0 100 100" fill="none"><polygon points="50,6 91,76 9,76" stroke="#EFAE3C" stroke-width="6" stroke-linejoin="round"/><polygon points="50,94 9,24 91,24" stroke="#EFAE3C" stroke-width="6" stroke-linejoin="round"/></svg>
  </div>
  <div class="kit-header-title">Kit Inmobiliario <span>Bolivia</span></div>
  <div class="spacer"></div>
  <div class="agent-badge" id="agent-badge" onclick="abrirPerfil()" title="Mi perfil">Agente</div>
  <button class="logout-kit-btn" onclick="logoutKit()">Salir</button>
</header>

<!-- MOBILE OVERLAY -->
<div class="mobile-overlay" id="mobile-overlay" onclick="toggleMobileMenu()"></div>
<div class="mobile-sidebar" id="mobile-sidebar">
  <div class="mobile-sidebar-top">
    <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:0.9rem;color:var(--navy);">Herramientas</div>
    <button class="mobile-close-btn" onclick="toggleMobileMenu()">&#10005;</button>
  </div>
  <div id="mobile-sidebar-phases"></div>
</div>

<!-- PERFIL MODAL -->
<div class="modal-bg" id="perfil-modal">
  <div class="modal-box">
    <h2>Mi perfil</h2>
    <p class="modal-sub">Tu informacion aparece en todos los textos y documentos generados.</p>
    <div class="photo-wrap">
      <div class="photo-ring" id="photo-ring-preview">&#128100;</div>
      <div>
        <div style="font-size:0.82rem;font-weight:600;color:var(--navy);margin-bottom:4px;">Foto de perfil</div>
        <input type="file" id="foto-input" accept="image/*" style="font-size:0.78rem;" onchange="cargarFoto(this)"/>
        <div style="font-size:0.72rem;color:var(--text-muted);margin-top:4px;">Se guarda solo en tu dispositivo.</div>
      </div>
    </div>
    <div class="form-group" style="margin-bottom:12px;">
      <label style="font-size:0.82rem;font-weight:600;color:var(--text-muted);">Nombre</label>
      <input type="text" id="perfil-nombre" style="padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:Inter,sans-serif;background:var(--surface-2);width:100%;"/>
    </div>
    <div class="form-group" style="margin-bottom:12px;">
      <label style="font-size:0.82rem;font-weight:600;color:var(--text-muted);">Ciudad</label>
      <input type="text" id="perfil-ciudad" placeholder="Ej: La Paz, Cochabamba..." style="padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:Inter,sans-serif;background:var(--surface-2);width:100%;"/>
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <label style="font-size:0.82rem;font-weight:600;color:var(--text-muted);">WhatsApp</label>
      <input type="text" id="perfil-whatsapp" placeholder="Ej: +591 71234567" style="padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:Inter,sans-serif;background:var(--surface-2);width:100%;"/>
    </div>
    <div class="form-group" style="margin-bottom:20px;">
      <label style="font-size:0.82rem;font-weight:600;color:var(--text-muted);">Email</label>
      <input type="email" id="perfil-email" placeholder="tu@correo.com" style="padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.9rem;font-family:Inter,sans-serif;background:var(--surface-2);width:100%;"/>
    </div>
    <div style="display:flex;gap:10px;">
      <button class="btn btn-primary" style="flex:1;" onclick="guardarPerfil()">Guardar cambios</button>
      <button class="btn btn-outline" onclick="cerrarPerfil()">Cancelar</button>
    </div>
    <div id="perfil-msg" style="font-size:0.82rem;margin-top:10px;min-height:1em;"></div>
  </div>
</div>

<div class="kit-body">

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-phase">
    <button class="phase-btn active" onclick="showPhase(0)">
      <span class="phase-num active">★</span> Mapa del proceso
    </button>
  </div>
  <div id="sidebar-phases"></div>
</nav>

<!-- MAIN -->
<main class="kit-main" id="kit-main">

  <!-- MAPA DEL PROCESO -->
  <div id="phase-mapa">
    <div style="margin-bottom:24px;">
      <h1 style="font-family:'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:700;color:var(--navy);margin-bottom:6px;">Tu proceso de venta</h1>
      <p style="color:var(--text-muted);font-size:0.9rem;">Haz clic en la etapa donde estás para ir directo a las herramientas que necesitas.</p>
    </div>
    <div class="mapa-grid" id="mapa-grid"></div>
  </div>

  <!-- FASES (se muestran/ocultan) -->
  <div id="phase-content" hidden></div>

</main>
</div>

<div class="toast" id="toast" hidden></div>

<script>
  // Chequeo de acceso — BORRADOR
  if(!sessionStorage.getItem("mk_auth")){
    window.location.href = "../login/";
  }
// ══════════════════════════════════════════════
// DATOS DEL AGENTE (viene del perfil en Supabase)
// ══════════════════════════════════════════════
const AGENTE = {
  nombre: sessionStorage.getItem('mk_nombre') || 'Agente',
  ciudad: sessionStorage.getItem('mk_ciudad') || 'Bolivia',
  whatsapp: sessionStorage.getItem('mk_whatsapp') || '',
  email: sessionStorage.getItem('mk_email') || ''
};
document.getElementById('agent-badge').textContent = AGENTE.nombre;

// ══════════════════════════════════════════════
// FASES Y HERRAMIENTAS
// ══════════════════════════════════════════════
const FASES = [
  { id:'captacion', num:1, nombre:'Captación', desc:'Reunión con el propietario, precio de salida, acuerdo de trabajo', color:'navy', tools:['guia-captacion','propuesta-propietario','calc-comision','ficha-captacion-pdf','acuerdo-trabajo'] },
  { id:'publicacion', num:2, nombre:'Publicación y marketing', desc:'Ficha de propiedad, canales, portales', color:'navy', tools:['ficha-propiedad','cartera-propiedades-excel'] },
  { id:'interesados', num:3, nombre:'Atención de interesados', desc:'Primera respuesta, filtrar leads, separar curiosos de compradores reales', color:'navy', tools:['respuesta-rapida','filtro-comprador'] },
  { id:'visita', num:4, nombre:'La visita', desc:'Checklist antes de mostrar, leer señales de cierre', color:'navy', tools:['checklist-visita'] },
  { id:'seguimiento', num:5, nombre:'Seguimiento post-visita', desc:'El agente promedio hace 1.3 contactos — se necesitan 5+', color:'gold', tools:['generador-seguimiento','control-seguimientos-excel'] },

// UTILIDADES
// ══════════════════════════════════════════════
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.hidden=false; clearTimeout(t._t); t._t=setTimeout(()=>{t.hidden=true;},2500); }

function copiar(texto){
  navigator.clipboard.writeText(texto).then(()=>toast('Copiado al portapapeles ✓')).catch(()=>{ const ta=document.createElement('textarea'); ta.value=texto; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); toast('Copiado ✓'); });
}

function abrirWhatsApp(texto){
  window.open('https://wa.me/?text='+encodeURIComponent(texto),'_blank');
}

function $(id){ return document.getElementById(id); }

// MAPA DEL PROCESO
// ══════════════════════════════════════════════
function buildMapa(){
  const grid = $('mapa-grid');
  FASES.forEach((f,i)=>{
    if(f.id==='transversal') return;
    const card = document.createElement('div');
    card.className = 'mapa-card' + (f.color==='gold'?' gold':'');
    card.innerHTML = `
      <div class="mapa-num">Etapa ${f.num}</div>
      <div class="mapa-name">${f.nombre}</div>
      <div class="mapa-desc">${f.desc}</div>
      <div class="mapa-tools">${f.tools.length} herramienta${f.tools.length>1?'s':''} →</div>
    `;
    card.onclick = ()=>showPhase(i);
    grid.appendChild(card);
  });
  // Transversal
  const card = document.createElement('div');
  card.className = 'mapa-card';
  const ft = FASES[FASES.length-1];
  card.innerHTML = `<div class="mapa-num">Siempre disponible</div><div class="mapa-name">${ft.nombre}</div><div class="mapa-desc">${ft.desc}</div><div class="mapa-tools">${ft.tools.length} recursos →</div>`;
  card.onclick = ()=>showPhase(FASES.length-1);
  grid.appendChild(card);
}

  const container = $('sidebar-phases');

function showPhase(idx){
  $('phase-mapa').hidden = true;

  $('phase-content').innerHTML = renderFase(FASES[idx], idx);

function generarSeguimiento(){
  const nombre = $('seg-nombre').value.trim() || 'el cliente';
  const propiedad = $('seg-propiedad').value.trim() || 'la propiedad';
  const tiempo = $('seg-tiempo').value;
  const reaccion = $('seg-reaccion').value;
  const novedad = $('seg-novedad').value.trim();
  const agente = AGENTE.nombre;

  const saludos = {'1dia':'Hola', '3dias':'Hola', '1semana':'Hola, espero que estés bien', '2semanas':'Hola, espero que estés bien', '1mes':'Hola, ¿cómo estás?'};
  const saludo = saludos[tiempo];

  let cuerpo = '';
  if(reaccion==='positivo') cuerpo = `Quería saber si pudiste reflexionar sobre ${propiedad} que visitamos. Si tienes alguna pregunta o te gustaría visitarla de nuevo, estoy disponible para coordinar.`;
  else if(reaccion==='precio') cuerpo = `Quería comentarte que he podido conversar con el propietario de ${propiedad} y hay posibilidad de negociar. Si te interesa retomarlo, con gusto coordinamos.`;
  else if(reaccion==='otro') cuerpo = `Quería saber cómo avanzó tu búsqueda. Si el otro inmueble no terminó de convencerte, ${propiedad} sigue disponible y el propietario está abierto a conversar.`;
  else if(reaccion==='frio') cuerpo = `Pasaron unos días desde que visitamos ${propiedad} y quería saber si surgió alguna duda o necesitas más información para tomar una decisión.`;
  else cuerpo = `¿Pudiste conversar con tu familia sobre ${propiedad}? Quería saber si llegaron a una conclusión o si necesitan ver la propiedad nuevamente.`;

  let novedadTexto = '';
  if(novedad) novedadTexto = `\n\nAdemás, quería contarte que ${novedad}.`;

  const mensaje = `${saludo}, ${nombre}. Soy ${agente}.\n\n${cuerpo}${novedadTexto}\n\nQuedo a tu disposición. Saludos.`;

  $('seg-texto').textContent = mensaje;
  $('seg-resultado').hidden = false;
}

function calcComision(){
  const precio = parseFloat($('com-precio').value)||0;
  const pct = parseFloat($('com-pct').value)||0;
  const tc = parseFloat($('com-tc').value)||10.5;
  if(!precio||!pct){ toast('Completa el precio y el porcentaje'); return; }
  const comUSD = precio * (pct/100);
  const comBs = comUSD * tc;
  const neto = precio - comUSD;
  $('com-usd').textContent = '$ '+comUSD.toLocaleString('es-BO',{minimumFractionDigits:0,maximumFractionDigits:0});
  $('com-bs').textContent = 'Bs. '+comBs.toLocaleString('es-BO',{minimumFractionDigits:0,maximumFractionDigits:0});
  $('com-total').textContent = '$ '+precio.toLocaleString('es-BO',{minimumFractionDigits:0,maximumFractionDigits:0});
  $('com-neto').textContent = '$ '+neto.toLocaleString('es-BO',{minimumFractionDigits:0,maximumFractionDigits:0});
  $('com-resultado').hidden = false;
}

function calcTC(){
  const precio = parseFloat($('tc-precio').value)||0;
  const oficial = parseFloat($('tc-oficial').value)||6.96;
  const paralelo = parseFloat($('tc-paralelo').value)||0;
  if(!precio||!paralelo){ toast('Completa todos los campos'); return; }
  const enOficial = precio * oficial;
  const enParalelo = precio * paralelo;
  const brecha = enParalelo - enOficial;
  $('tc-en-oficial').textContent = 'Bs. '+enOficial.toLocaleString('es-BO',{maximumFractionDigits:0});
  $('tc-en-paralelo').textContent = 'Bs. '+enParalelo.toLocaleString('es-BO',{maximumFractionDigits:0});
  $('tc-brecha').textContent = 'Bs. '+brecha.toLocaleString('es-BO',{maximumFractionDigits:0});
  const quien = $('tc-quien').value;
  $('tc-consejo').textContent = quien==='comprador'
    ? `Si el comprador paga en Bs. al tipo paralelo (Bs. ${paralelo}), está pagando Bs. ${brecha.toLocaleString('es-BO',{maximumFractionDigits:0})} más de lo que correspondería al tipo oficial. Conviene pactar en USD con acuerdo explícito del tipo de cambio.`
    : `Si el vendedor recibe en Bs. al tipo oficial (Bs. ${oficial}), recibe Bs. ${brecha.toLocaleString('es-BO',{maximumFractionDigits:0})} menos de lo que valdría al tipo paralelo. Conviene negociar a qué tasa se hace la conversión.`;
  $('tc-resultado').hidden = false;
}

function calcAntictretico(){
  const capital = parseFloat($('anti-capital').value)||0;
  const años = parseFloat($('anti-años').value)||2;
  const com = parseFloat($('anti-com').value)||3;
  const tc = parseFloat($('anti-tc').value)||10.5;
  const alquiler = parseFloat($('anti-alquiler').value)||0;
  if(!capital){ toast('Ingresa el capital del anticrético'); return; }
  const capBs = capital * tc;
  const comUSD = capital * (com/100);
  const totalAlquiler = alquiler * 12 * años;
  const ahorro = totalAlquiler - 0;
  const rendimiento = alquiler>0 ? ((alquiler*12)/capital*100).toFixed(1) : '—';
  $('anti-cap-bs').textContent = 'Bs. '+capBs.toLocaleString('es-BO',{maximumFractionDigits:0});
  $('anti-com-usd').textContent = '$ '+comUSD.toLocaleString('es-BO',{maximumFractionDigits:0});
  $('anti-ahorro').textContent = alquiler>0 ? '$ '+totalAlquiler.toLocaleString('es-BO',{maximumFractionDigits:0})+' equiv.' : 'N/A';
  $('anti-rendimiento').textContent = rendimiento !== '—' ? rendimiento+'% anual' : '—';
  $('anti-resultado').hidden = false;
}

  const baños = $('ficha-baños').value;
  const m2 = $('ficha-m2').value;
  const featuresRaw = $('ficha-features').value.trim();
  const features = featuresRaw ? featuresRaw.split('\n').filter(f=>f.trim()).map(f=>'✅ '+f.trim()).join('\n') : '';

  const emojis = {Venta:'🔑',Alquiler:'🏡',Anticrético:'🤝'};

  if(baños) detalles.push(`🚿 ${baños} baño${baños>1?'s':''}`);
  if(m2) detalles.push(`📐 ${m2} m²`);

  const texto = `${emoji} EN ${op.toUpperCase()}: ${tipo} en ${zona}

💲 Precio: ${precio}

${detalles.join('   ')}

${features ? features+'\n' : ''}
📍 Ubicación: ${zona}

${features ? '' : ''}Interesados comunicarse al WhatsApp 👇
📱 ${AGENTE.nombre} — ${AGENTE.whatsapp}`;

  $('ficha-resultado').hidden = false;
}

function toolFiltroComprador(){
  const preguntas = [

    {q:'¿Has visto otras propiedades recientemente?', a:['Sí, he visitado varias','He visto algunas','No, esta es la primera']},
    {q:'¿Quién toma la decisión final de compra?', a:['Yo solo','Yo y mi pareja/familia','Depende de financiamiento o terceros']},
  ];
  let html = `<div class="tool-section" id="tool-filtro">
    <div class="tool-header">
      <div class="tool-icon">🔍</div>
      <div><div class="tool-title">Filtro: ¿comprador real o mirón? <span class="tool-badge badge-guia">Guía</span></div>

    </div>

    <div id="filtro-preguntas">`;

  preguntas.forEach((p,i)=>{
    html += `<div style="margin-bottom:16px;padding:14px;background:var(--surface-2);border-radius:var(--radius-sm);">
      <div style="font-size:0.88rem;font-weight:600;color:var(--navy);margin-bottom:10px;">${i+1}. ${p.q}</div>`;
    p.a.forEach((a,j)=>{
      html += `<label style="display:flex;align-items:center;gap:8px;font-size:0.83rem;color:var(--text);margin-bottom:6px;cursor:pointer;">
        <input type="radio" name="filtro-${i}" value="${j}" style="accent-color:var(--navy);" onchange="evaluarFiltro()"> ${a}
      </label>`;
    });
    html += `</div>`;
  });

  html += `</div>
    <div id="filtro-resultado" hidden>
      <div class="result-box" id="filtro-resultado-box">
        <div class="result-label">Perfil del comprador</div>
        <div class="result-text" id="filtro-texto"></div>
      </div>
    </div>
  </div>`;
  return html;
}

function evaluarFiltro(){
  const vals = [];
  for(let i=0;i<5;i++){
    const sel = document.querySelector(`input[name="filtro-${i}"]:checked`);
    if(sel) vals.push(parseInt(sel.value));
  }
  if(vals.length<3) return;
  const score = vals.reduce((s,v)=>s+(v===0?2:v===1?1:0),0);
  let perfil='', consejo='';
  if(score>=7){ perfil='🟢 Comprador serio'; consejo='Coordina la visita cuanto antes. Tiene urgencia, presupuesto definido y capacidad de decisión. No lo hagas esperar.'; }
  else if(score>=4){ perfil='🟡 Interesado potencial'; consejo='Vale la pena seguir conversando. Confirma el presupuesto y el financiamiento antes de agendar la visita para asegurarte de que es viable.'; }
  else{ perfil='🔴 Mirón o explorador temprano'; consejo='No coordines una visita aún. Mantén el contacto, compártele información general y vuelve a calificarlo en 2-3 semanas cuando su situación haya avanzado.'; }
  $('filtro-texto').textContent = perfil+'\n\n'+consejo;
  $('filtro-resultado').hidden = false;
}

function generarComparacion(){
  const props = [1,2,3].map(n=>({
    nombre: document.getElementById(`comp-nombre-${n}`).value.trim(),
    precio: parseFloat(document.getElementById(`comp-precio-${n}`).value)||0,
    m2: parseFloat(document.getElementById(`comp-m2-${n}`).value)||0,
    dorm: parseFloat(document.getElementById(`comp-dorm-${n}`).value)||0,
  })).filter(p=>p.nombre||p.precio);
  if(props.length<2){ toast('Completa al menos 2 propiedades'); return; }

  let tabla = `<table style="width:100%;border-collapse:collapse;font-size:0.83rem;">
    <thead><tr style="background:var(--navy);color:#fff;">
      <th style="padding:8px 12px;text-align:left;">Característica</th>
      ${props.map(p=>`<th style="padding:8px 12px;text-align:center;">${p.nombre||'—'}</th>`).join('')}
    </tr></thead><tbody>`;

  const rows = [
    {label:'Precio (USD)', fn:p=>p.precio?'$ '+p.precio.toLocaleString('es-BO'):'—'},
    {label:'Superficie (m²)', fn:p=>p.m2?p.m2+' m²':'—'},
    {label:'Precio por m²', fn:p=>(p.precio&&p.m2)?'$ '+(p.precio/p.m2).toFixed(0)+'/m²':'—'},
    {label:'Dormitorios', fn:p=>p.dorm||'—'},
  ];

  rows.forEach((r,i)=>{
    const bg = i%2===0?'var(--surface-2)':'var(--surface)';
    tabla += `<tr style="background:${bg};">
      <td style="padding:8px 12px;font-weight:600;color:var(--navy);">${r.label}</td>
      ${props.map(p=>`<td style="padding:8px 12px;text-align:center;">${r.fn(p)}</td>`).join('')}
    </tr>`;
  });

  tabla += `</tbody></table>`;
  $('comp-tabla').innerHTML = tabla;

  // Texto plano para copiar
  let txt = 'COMPARACIÓN DE INMUEBLES\n\n';
  props.forEach(p=>{ txt += `${p.nombre||'Propiedad'}: $${p.precio.toLocaleString('es-BO')} | ${p.m2?p.m2+'m²':''} | ${p.dorm?p.dorm+' dorm.':''}\n`; });
  $('comp-texto-plano').textContent = txt;
  $('comp-resultado').hidden = false;
}

  });
}

// ══════════════════════════════════════════════
// GENERADOR DE PDF
// ══════════════════════════════════════════════
function loadJsPDF(){
  return new Promise(function(resolve, reject){
    if(window.jspdf && window.jspdf.jsPDF){ resolve(true); return; }
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js';
    s.onload = function(){ setTimeout(function(){ resolve(true); }, 100); };
    s.onerror = function(){ reject(new Error('No se pudo cargar jsPDF')); };
    document.head.appendChild(s);
  });
}

function detectImgFormat(dataUrl){
  if(!dataUrl) return 'JPEG';
  if(dataUrl.indexOf('image/png') > -1) return 'PNG';
  if(dataUrl.indexOf('image/gif') > -1) return 'GIF';
  return 'JPEG';
}

function descargarBlob(blob, filename){
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){ document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}

async function generarPDFDoc(titulo, texto, fotos){
  toast('Preparando PDF...');
  try{
    await loadJsPDF();
  } catch(e){
    toast('Error al cargar el generador de PDF. Verifica tu conexion.');
    return;
  }

  try{
    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    var pageW = 210, pageH = 297, margin = 18, contentW = pageW - margin * 2;

    // HEADER
    doc.setFillColor(27, 51, 94);
    doc.rect(0, 0, pageW, 44, 'F');
    doc.setFillColor(239, 174, 60);
    doc.rect(0, 44, pageW, 2, 'F');

    var textX = margin;
    var fotoAgente = localStorage.getItem('mk_foto');
    if(fotoAgente){
      try{
        var fmt = detectImgFormat(fotoAgente);
        doc.addImage(fotoAgente, fmt, margin, 7, 28, 28);
        textX = margin + 34;
      } catch(e){ textX = margin; }
    }

    doc.setTextColor(255, 255, 255);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(13);
    doc.text(AGENTE.nombre || 'Agente', textX, 17);
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(190, 205, 230);
    var infoY = 25;
    if(AGENTE.ciudad){ doc.text(AGENTE.ciudad, textX, infoY); infoY += 6; }
    if(AGENTE.whatsapp){ doc.text('WhatsApp: ' + AGENTE.whatsapp, textX, infoY); infoY += 6; }
    if(AGENTE.email){ doc.text('Email: ' + AGENTE.email, textX, infoY); }

    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(239, 174, 60);
    doc.text('MERKABA', pageW - margin, 12, { align:'right' });
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(7);
    doc.setTextColor(160, 180, 210);
    doc.text('Kit del Agente Inmobiliario Boliviano', pageW - margin, 18, { align:'right' });
    var fecha = new Date().toLocaleDateString('es-BO', { day:'2-digit', month:'long', year:'numeric' });
    doc.text(fecha, pageW - margin, 36, { align:'right' });

    // TITULO
    var y = 56;
    doc.setTextColor(27, 51, 94);
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(15);
    doc.text(titulo.replace(/_/g, ' '), pageW / 2, y, { align:'center' });
    y += 6;
    doc.setFillColor(239, 174, 60);
    doc.rect(pageW/2 - 20, y, 40, 0.8, 'F');
    y += 10;

    // CONTENIDO
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(10.5);
    doc.setTextColor(27, 35, 51);
    var lineas = doc.splitTextToSize(texto || '', contentW);
    for(var li = 0; li < lineas.length; li++){
      if(y > pageH - 28){ doc.addPage(); y = 22; }
      doc.text(lineas[li], margin, y);
      y += 5.8;
    }
    y += 8;

    // FOTOS DE PROPIEDAD
    var fotosFiltradas = (fotos || []).filter(function(f){ return !!f; }).slice(0, 5);
    if(fotosFiltradas.length > 0){
      if(y > pageH - 90){ doc.addPage(); y = 22; }
      doc.setFont('helvetica', 'bold');
      doc.setFontSize(11);
      doc.setTextColor(27, 51, 94);
      doc.text('Fotografias de la propiedad', margin, y);
      y += 5;
      doc.setFillColor(239, 174, 60);
      doc.rect(margin, y, 50, 0.7, 'F');
      y += 10;
      var photoW = (contentW - 6) / 2;
      var photoH = photoW * 0.62;
      var col = 0;
      for(var fi = 0; fi < fotosFiltradas.length; fi++){
        if(col === 0 && y + photoH > pageH - 28){ doc.addPage(); y = 22; }
        var x = margin + col * (photoW + 6);
        try{
          var fmtP = detectImgFormat(fotosFiltradas[fi]);
          doc.addImage(fotosFiltradas[fi], fmtP, x, y, photoW, photoH);
        } catch(e2){}
        col++;
        if(col >= 2){ col = 0; y += photoH + 6; }
      }
      if(col > 0) y += photoH + 6;
    }

    // FOOTER
    var total = doc.internal.getNumberOfPages();
    for(var p = 1; p <= total; p++){
      doc.setPage(p);
      doc.setFillColor(27, 51, 94);
      doc.rect(0, pageH - 11, pageW, 11, 'F');
      doc.setTextColor(180, 200, 230);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(7.5);
      doc.text('Merkaba Consulting Group · Kit del Agente Inmobiliario Boliviano', pageW / 2, pageH - 4, { align:'center' });
      doc.setTextColor(239, 174, 60);
      doc.text('Pag. ' + p + ' / ' + total, pageW - margin, pageH - 4, { align:'right' });
    }

    // DESCARGA sin doc.save() para evitar conflicto con Cloudflare
    var pdfBlob = doc.output('blob');
    var filename = titulo.replace(/[^a-zA-Z0-9 ]/g, '').replace(/\s+/g, '_') + '.pdf';
    descargarBlob(pdfBlob, filename);
    toast('PDF descargado correctamente.');

  } catch(err){
    toast('Error al generar el PDF: ' + (err.message || 'error desconocido'));
    console.error('PDF error:', err);
  }
}

async function generarPDFPropuesta(){
  var texto = $('prop-texto') ? $('prop-texto').textContent.trim() : '';
  if(!texto){ toast('Genera la propuesta primero.'); return; }
  await generarPDFDoc('Propuesta de Captacion', texto, []);
}

async function generarPDFFicha(){
  var texto = $('ficha-texto') ? $('ficha-texto').textContent.trim() : '';
  if(!texto){ toast('Genera la ficha primero.'); return; }
  await generarPDFDoc('Ficha de Propiedad', texto, _fotosPropiedad);
}

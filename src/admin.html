<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Merkaba - Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1422; --surface:#101C30; --surface-2:#162438;
  --border:rgba(255,255,255,0.07); --border-md:rgba(255,255,255,0.11);
  --gold:#EFAE3C; --gold-dim:#C48C22;
  --gold-glow:rgba(239,174,60,0.10); --gold-glow-md:rgba(239,174,60,0.18);
  --gold-grad:linear-gradient(135deg,#EFAE3C,#C48C22);
  --border-gold:rgba(239,174,60,0.22); --border-gold-md:rgba(239,174,60,0.40);
  --t1:rgba(238,245,255,0.96); --t2:rgba(180,205,240,0.68);
  --t3:rgba(140,175,220,0.42); --t4:rgba(110,150,205,0.24);
  --ok:#3DD68C; --ok-bg:rgba(61,214,140,0.09); --ok-br:rgba(61,214,140,0.18);
  --err:#FF6B6B; --err-bg:rgba(255,107,107,0.09); --err-br:rgba(255,107,107,0.18);
  --ff-d:'Space Grotesk',sans-serif; --ff-b:'Inter',sans-serif; --ff-m:'IBM Plex Mono',monospace;
  --ease-out:cubic-bezier(0.16,1,0.3,1);
  --radius:14px; --radius-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0;}
[hidden]{display:none!important;}
html,body{min-height:100%;font-family:var(--ff-b);background:var(--bg);color:var(--t1);line-height:1.5;-webkit-font-smoothing:antialiased;}

/* LOGIN SCREEN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--surface);border:1px solid var(--border-md);border-radius:20px;padding:32px;max-width:360px;width:100%;box-shadow:0 4px 6px rgba(0,0,0,0.14),0 20px 44px rgba(0,0,0,0.24);position:relative;overflow:hidden;}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold-grad);}
.login-icon{width:40px;height:40px;border-radius:10px;background:var(--gold-glow);border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;margin-bottom:14px;}
.login-card h1{font-family:var(--ff-d);font-size:1.15rem;font-weight:700;letter-spacing:-0.025em;color:var(--t1);margin-bottom:5px;}
.login-card p{font-size:0.84rem;color:var(--t3);margin-bottom:20px;line-height:1.5;}
.fld-label{display:block;font-family:var(--ff-m);font-size:0.67rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);margin-bottom:7px;}
input[type="password"]{width:100%;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--t1);font-family:var(--ff-m);font-size:0.9rem;outline:none;transition:border-color 0.25s var(--ease-out),background 0.25s var(--ease-out),box-shadow 0.25s var(--ease-out);margin-bottom:12px;}
input[type="password"]:focus{border-color:var(--border-gold-md);background:rgba(239,174,60,0.04);box-shadow:0 0 0 3px rgba(239,174,60,0.07);}
input[type="password"]::placeholder{color:var(--t4);}
input[type="text"]{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.86rem;font-family:var(--ff-b);color:var(--t1);background:rgba(255,255,255,0.04);width:100%;outline:none;transition:border-color 0.2s var(--ease-out),box-shadow 0.2s var(--ease-out);}
input[type="text"]:focus{border-color:var(--border-gold-md);background:rgba(239,174,60,0.04);box-shadow:0 0 0 3px rgba(239,174,60,0.06);}
input[type="text"]::placeholder{color:var(--t4);}

/* BUTTONS */
.btn{padding:10px 18px;border-radius:var(--radius-sm);font-weight:700;font-size:0.88rem;cursor:pointer;font-family:var(--ff-d);border:none;transition:all 0.22s var(--ease-out);white-space:nowrap;}
.btn-navy{background:var(--gold);color:#0B1422;}
.btn-navy:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(239,174,60,0.25);}
.btn-navy:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--t3);padding:6px 14px;border-radius:999px;font-size:0.8rem;font-family:var(--ff-b);}
.btn-ghost:hover{border-color:var(--border-md);color:var(--t1);}

.btn-primary-full{width:100%;padding:13px;font-size:0.95rem;border-radius:var(--radius-sm);}

/* FORM MSG */
.form-msg{font-size:0.8rem;margin-top:8px;min-height:1em;font-family:var(--ff-m);}
.form-msg.ok{color:var(--ok);}
.form-msg.err{color:var(--err);}

/* PANEL (hidden until login) */
.panel{display:none;}
.panel.visible{display:block;}

/* HEADER */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px clamp(16px,4vw,40px);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-icon{width:32px;height:32px;border-radius:8px;background:var(--surface-2);border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;}
.brand-word{font-family:var(--ff-d);font-weight:700;font-size:0.95rem;letter-spacing:-0.02em;color:var(--t1);}
.brand-word small{display:block;font-family:var(--ff-m);font-size:0.6rem;color:var(--t4);letter-spacing:0.08em;text-transform:uppercase;margin-top:1px;}
.admin-badge{padding:4px 10px;border-radius:6px;background:var(--gold-glow);border:1px solid var(--border-gold);font-family:var(--ff-m);font-size:0.67rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--gold);}

/* MAIN LAYOUT */
.main{max-width:920px;margin:0 auto;padding:clamp(22px,3vw,36px) clamp(18px,3vw,32px);}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:22px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 22px;position:relative;overflow:hidden;}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-card.total::after{background:linear-gradient(90deg,var(--gold),rgba(239,174,60,0.1));}
.stat-card.active::after{background:linear-gradient(90deg,var(--ok),rgba(61,214,140,0.1));}
.stat-card.inactive::after{background:linear-gradient(90deg,var(--err),rgba(255,107,107,0.1));}
.stat-num{font-family:var(--ff-d);font-size:2.2rem;font-weight:700;letter-spacing:-0.05em;color:var(--t1);line-height:1;margin-bottom:4px;}
.stat-label{font-family:var(--ff-m);font-size:0.67rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);}

/* ADD CLIENT CARD */
.add-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:20px;position:relative;overflow:hidden;}
.add-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border-gold),transparent);}
.add-card h2{font-family:var(--ff-d);font-size:0.92rem;font-weight:700;letter-spacing:-0.01em;color:var(--t1);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.add-icon{width:20px;height:20px;border-radius:6px;background:var(--gold-glow);border:1px solid var(--border-gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:0.85rem;font-weight:700;font-family:var(--ff-d);}
.form-row{display:grid;gap:10px;margin-bottom:0;}
.form-row.cols-6-btn{grid-template-columns:1.3fr 0.9fr 0.7fr 0.9fr 0.9fr 0.75fr auto;align-items:end;}
@media(max-width:860px){.form-row.cols-6-btn{grid-template-columns:1fr 1fr;}.stats-row{grid-template-columns:1fr;}}
@media(max-width:560px){.form-row.cols-6-btn{grid-template-columns:1fr;}.form-row.cols-6-btn button{width:100%;}}
select.fld-select{padding:8px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:0.86rem;font-family:var(--ff-b);color:var(--t1);background:rgba(255,255,255,0.04);width:100%;outline:none;}
.plan-badge{font-size:0.7rem;padding:4px 10px;border-radius:999px;border:none;cursor:pointer;font-weight:700;font-family:var(--ff-m);letter-spacing:0.04em;text-transform:uppercase;transition:all 0.2s var(--ease-out);}
.plan-badge.basico{background:rgba(255,255,255,0.05);color:var(--t3);border:1px solid var(--border);}
.plan-badge.completo{background:var(--gold-glow);color:var(--gold);border:1px solid var(--border-gold);}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-group label{font-family:var(--ff-m);font-size:0.67rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--t3);}

/* LISTA DE CLIENTES (tarjetas, mobile-first) */
.table-card{background:transparent;border:none;overflow:visible;}
.table-header{padding:0 2px 12px;display:flex;align-items:center;justify-content:space-between;}
.table-header h2{font-family:var(--ff-d);font-size:0.92rem;font-weight:700;letter-spacing:-0.01em;color:var(--t1);}
.count-badge{padding:3px 9px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid var(--border);font-family:var(--ff-m);font-size:0.67rem;font-weight:700;color:var(--t2);}
.clientes-grid{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.buscador-clientes{margin-bottom:10px;}
.cliente-card{padding:10px 14px;border-bottom:1px solid var(--border);}
.cliente-card:last-child{border-bottom:none;}
.cr-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;}
.cr-summary:hover{background:rgba(255,255,255,0.02);}
.cr-main{min-width:0;flex:1;}
.cr-nombre{font-family:var(--ff-d);font-weight:700;font-size:0.88rem;letter-spacing:-0.01em;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr-meta{font-size:0.74rem;color:var(--t3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cc-badges{display:flex;gap:5px;flex-shrink:0;}
.cc-detail{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.cc-body{display:flex;flex-direction:column;gap:6px;}
.cc-field{display:flex;justify-content:space-between;gap:10px;font-size:0.84rem;color:var(--t2);}
.cc-field span{color:var(--t4);font-family:var(--ff-m);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.06em;}
.cc-field b{font-weight:500;color:var(--t2);text-align:right;word-break:break-word;}
.cc-actions{display:flex;gap:8px;margin-top:10px;}
.cc-edit{display:flex;flex-direction:column;gap:8px;}
.cc-edit-actions{display:flex;gap:8px;}
.cc-since{font-family:var(--ff-m);font-size:0.7rem;color:var(--t4);margin-top:6px;}
.btn-sm{padding:7px 14px;font-size:0.8rem;}

/* TOGGLE BUTTONS */
.btn-toggle{font-size:0.7rem;padding:4px 10px;border-radius:999px;border:none;cursor:pointer;font-weight:700;font-family:var(--ff-m);letter-spacing:0.04em;text-transform:uppercase;transition:all 0.2s var(--ease-out);}
.btn-toggle.activo{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-br);}
.btn-toggle.inactivo{background:var(--err-bg);color:var(--err);border:1px solid var(--err-br);}
.btn-danger{background:none;border:1px solid var(--border);color:var(--t4);font-size:0.7rem;padding:4px 10px;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--ff-m);transition:all 0.2s var(--ease-out);}
.btn-danger:hover{background:var(--err-bg);border-color:var(--err-br);color:var(--err);}

/* EMPTY STATE */
.empty-state{padding:40px;text-align:center;color:var(--t3);font-size:0.9rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);}
.logout-btn{background:none;border:1px solid var(--border);color:var(--t3);font-size:0.78rem;padding:6px 14px;border-radius:999px;cursor:pointer;font-family:var(--ff-b);transition:all 0.2s var(--ease-out);}
.logout-btn:hover{color:var(--t1);border-color:var(--border-md);}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-icon">
      <svg width="18" height="18" viewBox="0 0 100 100" fill="none">
        <polygon points="50,6 91,76 9,76" stroke="#EFAE3C" stroke-width="7" stroke-linejoin="round"/>
        <polygon points="50,94 9,24 91,24" stroke="#EFAE3C" stroke-width="7" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Panel de administrador</h1>
    <p>Ingresa tu contrasena de administrador.</p>
    <div class="form-group" style="margin-bottom:12px;">
      <label class="fld-label">Contrasena</label>
      <input type="password" id="admin-pwd-input" placeholder="..."/>
    </div>
    <button class="btn btn-navy btn-primary-full" id="btn-login" onclick="adminLogin()">Entrar</button>
    <div class="form-msg err" id="login-error"></div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div class="panel" id="panel">
  <header>
    <div class="brand">
      <div class="brand-icon">
        <svg width="16" height="16" viewBox="0 0 100 100" fill="none">
          <polygon points="50,6 91,76 9,76" stroke="#EFAE3C" stroke-width="7" stroke-linejoin="round"/>
          <polygon points="50,94 9,24 91,24" stroke="#EFAE3C" stroke-width="7" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand-word">Merkaba <small>Admin</small></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <span class="admin-badge">Admin</span>
      <button class="logout-btn" onclick="adminLogout()">Cerrar sesion</button>
    </div>
  </header>

  <div class="main">

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card total">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">Total clientes</div>
      </div>
      <div class="stat-card active">
        <div class="stat-num" id="stat-active">0</div>
        <div class="stat-label">Activos</div>
      </div>
      <div class="stat-card inactive">
        <div class="stat-num" id="stat-inactive">0</div>
        <div class="stat-label">Inactivos</div>
      </div>
    </div>

    <!-- Add client -->
    <div class="add-card">
      <h2><div class="add-icon">+</div> Agregar nuevo cliente</h2>
      <div class="form-row cols-6-btn">
        <div class="form-group">
          <label>Nombre completo</label>
          <input type="text" id="nuevo-nombre" placeholder="Ej: Maria Quispe"/>
        </div>
        <div class="form-group">
          <label>Contrasena de acceso</label>
          <input type="text" id="nuevo-pwd" placeholder="Ej: agente2025"/>
        </div>
        <div class="form-group">
          <label>Ciudad</label>
          <input type="text" id="nuevo-ciudad" placeholder="La Paz"/>
        </div>
        <div class="form-group">
          <label>WhatsApp</label>
          <input type="text" id="nuevo-whatsapp" placeholder="+591 7..."/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="text" id="nuevo-email" placeholder="correo@..."/>
        </div>
        <div class="form-group">
          <label>Plan</label>
          <select class="fld-select" id="nuevo-plan">
            <option value="basico">Basico</option>
            <option value="completo">Completo</option>
          </select>
        </div>
        <button class="btn btn-navy" id="btn-agregar" onclick="agregarCliente()">Agregar</button>
      </div>
      <div class="form-msg" id="add-msg"></div>
    </div>

    <!-- Clients table -->
    <div class="table-card">
      <div class="table-header">
        <h2>Clientes</h2>
        <span class="count-badge" id="count-badge">0</span>
      </div>
      <div class="buscador-clientes">
        <input type="text" id="buscador-input" placeholder="Buscar cliente por nombre..." oninput="filtrarClientes(this.value)"/>
      </div>
      <div id="tabla-wrap" class="clientes-grid"><div class="empty-state">Cargando...</div></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL = 'https://rdmqlclavqbhrhxbkiwo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkbXFsY2xhdnFiaHJoeGJraXdvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTQyMTUsImV4cCI6MjA5NzAzMDIxNX0.y06LLkP2TuyffScZl-rGNsl1pMLtpqYSisBG8-t727Q';
const sb = window.supabase.createClient(SB_URL, SB_KEY);
const DEMO_CLIENTE_ID = '033a71aa-b53c-450f-b0e7-332c7ec25b01';
let APWD = '';

async function adminLogin(){
  const pwd = document.getElementById('admin-pwd-input').value.trim();
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');
  if(!pwd){ errEl.textContent='Ingresa la contrasena.'; return; }
  btn.disabled=true; btn.textContent='Verificando...';
  APWD=pwd;
  const ok=await cargarClientes();
  btn.disabled=false; btn.textContent='Entrar';
  if(ok){ sessionStorage.setItem('mk_admin',pwd); document.getElementById('login-wrap').style.display='none'; document.getElementById('panel').classList.add('visible'); }
  else{ APWD=''; errEl.textContent='Contrasena incorrecta.'; document.getElementById('admin-pwd-input').value=''; }
}

function adminLogout(){
  sessionStorage.removeItem('mk_admin'); APWD='';
  document.getElementById('login-wrap').style.display='flex';
  document.getElementById('panel').classList.remove('visible');
  document.getElementById('admin-pwd-input').value='';
}

let CLIENTES = [];

async function cargarClientes(){
  const {data,error}=await sb.rpc('admin_list_clientes',{admin_pwd:APWD});
  if(error) return false;
  CLIENTES = (data||[]).slice().sort(function(a,b){
    if(a.id===DEMO_CLIENTE_ID) return -1;
    if(b.id===DEMO_CLIENTE_ID) return 1;
    return a.nombre.localeCompare(b.nombre,'es',{sensitivity:'base'});
  });
  actualizarStats(CLIENTES);
  const q=(document.getElementById('buscador-input')||{}).value||'';
  filtrarClientes(q);
  return true;
}

function actualizarStats(list){
  document.getElementById('count-badge').textContent=list.length;
  const activos=list.filter(function(c){return c.activo;}).length;
  document.getElementById('stat-total').textContent=list.length;
  document.getElementById('stat-active').textContent=activos;
  document.getElementById('stat-inactive').textContent=list.length-activos;
}

function filtrarClientes(q){
  q=(q||'').trim().toLowerCase();
  const filtrados = !q ? CLIENTES : CLIENTES.filter(function(c){ return (c.nombre||'').toLowerCase().indexOf(q)!==-1; });
  renderLista(filtrados);
}

function clienteRowHTML(c){
  const f=new Date(c.created_at).toLocaleDateString('es-BO',{day:'2-digit',month:'short',year:'numeric'});
  const plan=c.plan||'basico';
  const id=c.id;
  const esDemo=id===DEMO_CLIENTE_ID;
  const meta=[c.ciudad,c.whatsapp].filter(Boolean).join(' · ')||'—';
  const fotoHTML=!esDemo?'':(
    '<div class="cc-field"><span>Foto demo</span><b>'
    +'<div style="display:flex;align-items:center;gap:10px;justify-content:flex-end;">'
    +(c.foto?'<img src="'+c.foto+'" alt="foto demo" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--border-gold);">':'')
    +'<button class="btn-ghost btn-sm" onclick="document.getElementById(\'demo-foto-input-'+id+'\').click()">Cambiar foto</button>'
    +'<input type="file" accept="image/*" id="demo-foto-input-'+id+'" style="display:none;" onchange="cambiarFotoDemo(\''+id+'\',this)">'
    +'</div></b></div>'
  );
  return '<div class="cliente-card" data-id="'+id+'">'
    +'<div class="cr-summary" onclick="toggleCliente(\''+id+'\')">'
      +'<div class="cr-main">'
        +'<div class="cr-nombre">'+esc(c.nombre)+'</div>'
        +'<div class="cr-meta">'+esc(meta)+'</div>'
      +'</div>'
      +'<div class="cc-badges">'
        +'<button class="plan-badge '+plan+'" data-id="'+id+'" onclick="event.stopPropagation();cambiarPlan(this)">'+(plan==='completo'?'Completo':'Basico')+'</button>'
        +'<button class="btn-toggle '+(c.activo?'activo':'inactivo')+'" data-id="'+id+'" onclick="event.stopPropagation();toggleActivo(this)">'+(c.activo?'Activo':'Inactivo')+'</button>'
      +'</div>'
    +'</div>'
    +'<div class="cc-detail" id="cc-detail-'+id+'" hidden>'
      +'<div class="cc-body" id="cc-view-'+id+'">'
        +'<div class="cc-field"><span>Contrasena</span><b>'+esc(c.password)+'</b></div>'
        +'<div class="cc-field"><span>Ciudad</span><b>'+esc(c.ciudad||'—')+'</b></div>'
        +'<div class="cc-field"><span>WhatsApp</span><b>'+esc(c.whatsapp||'—')+'</b></div>'
        +'<div class="cc-field"><span>Email</span><b>'+esc(c.email||'—')+'</b></div>'
        +fotoHTML
        +'<div class="cc-since">Cliente desde '+f+'</div>'
        +'<div class="cc-actions">'
          +'<button class="btn-ghost btn-sm" onclick="activarEdicion(\''+id+'\')">Editar</button>'
          +'<button class="btn-danger" data-id="'+id+'" data-nombre="'+esc(c.nombre)+'" onclick="eliminarCliente(this)">Eliminar</button>'
        +'</div>'
      +'</div>'
      +'<div class="cc-edit" id="cc-edit-'+id+'" hidden>'
        +'<div class="form-group"><label>Nombre</label><input type="text" id="ed-nombre-'+id+'" value="'+esc(c.nombre)+'"/></div>'
        +'<div class="form-group"><label>Contrasena</label><input type="text" id="ed-pwd-'+id+'" value="'+esc(c.password)+'"/></div>'
        +'<div class="form-group"><label>Ciudad</label><input type="text" id="ed-ciudad-'+id+'" value="'+esc(c.ciudad||'')+'"/></div>'
        +'<div class="form-group"><label>WhatsApp</label><input type="text" id="ed-whatsapp-'+id+'" value="'+esc(c.whatsapp||'')+'"/></div>'
        +'<div class="form-group"><label>Email</label><input type="text" id="ed-email-'+id+'" value="'+esc(c.email||'')+'"/></div>'
        +'<div class="cc-edit-actions">'
          +'<button class="btn btn-navy btn-sm" onclick="guardarEdicion(\''+id+'\')">Guardar</button>'
          +'<button class="btn-ghost" onclick="cancelarEdicion(\''+id+'\')">Cancelar</button>'
        +'</div>'
      +'</div>'
    +'</div>'
  +'</div>';
}

function renderLista(list){
  if(!list.length){ document.getElementById('tabla-wrap').innerHTML='<div class="empty-state">No hay clientes que coincidan.</div>'; return; }
  document.getElementById('tabla-wrap').innerHTML = list.map(clienteRowHTML).join('');
}

function toggleCliente(id){
  const d=document.getElementById('cc-detail-'+id);
  if(d) d.hidden = !d.hidden;
}

function activarEdicion(id){
  document.getElementById('cc-view-'+id).hidden = true;
  document.getElementById('cc-edit-'+id).hidden = false;
}

function cancelarEdicion(id){
  document.getElementById('cc-view-'+id).hidden = false;
  document.getElementById('cc-edit-'+id).hidden = true;
}

async function guardarEdicion(id){
  const nombre=document.getElementById('ed-nombre-'+id).value.trim();
  const pwd=document.getElementById('ed-pwd-'+id).value.trim();
  const ciudad=document.getElementById('ed-ciudad-'+id).value.trim();
  const whatsapp=document.getElementById('ed-whatsapp-'+id).value.trim();
  const email=document.getElementById('ed-email-'+id).value.trim();
  if(!nombre||!pwd){ alert('Nombre y contrasena no pueden quedar vacios.'); return; }
  const {data,error}=await sb.rpc('admin_update_cliente',{admin_pwd:APWD,p_id:id,p_nombre:nombre,p_password:pwd,p_ciudad:ciudad,p_whatsapp:whatsapp,p_email:email});
  if(error||!data||!data.ok){ alert('No se pudo guardar los cambios.'); return; }
  cargarClientes();
}

async function agregarCliente(){
  const nombre=document.getElementById('nuevo-nombre').value.trim();
  const pwd=document.getElementById('nuevo-pwd').value.trim();
  const msg=document.getElementById('add-msg');
  const btn=document.getElementById('btn-agregar');
  if(!nombre||!pwd){ msg.className='form-msg err'; msg.textContent='Completa nombre y contrasena.'; return; }
  btn.disabled=true; btn.textContent='Agregando...';
  const ciudad=document.getElementById('nuevo-ciudad').value.trim();
  const whatsapp=document.getElementById('nuevo-whatsapp').value.trim();
  const email=document.getElementById('nuevo-email').value.trim();
  const plan=document.getElementById('nuevo-plan').value;
  const {data,error}=await sb.rpc('admin_add_cliente',{admin_pwd:APWD,p_nombre:nombre,p_password:pwd,p_ciudad:ciudad,p_whatsapp:whatsapp,p_email:email,p_plan:plan});
  btn.disabled=false; btn.textContent='Agregar';
  if(error||!data||!data.ok){ msg.className='form-msg err'; msg.textContent='Error al agregar.'; return; }
  msg.className='form-msg ok'; msg.textContent='Cliente agregado.';
  document.getElementById('nuevo-nombre').value='';
  document.getElementById('nuevo-pwd').value='';
  document.getElementById('nuevo-ciudad').value='';
  document.getElementById('nuevo-whatsapp').value='';
  document.getElementById('nuevo-email').value='';
  document.getElementById('nuevo-plan').value='basico';
  setTimeout(function(){ msg.textContent=''; },3000);
  cargarClientes();
}

async function cambiarPlan(btn){
  const actual=btn.classList.contains('completo')?'completo':'basico';
  const nuevo=actual==='completo'?'basico':'completo';
  if(!confirm('Cambiar el plan a "'+(nuevo==='completo'?'Completo':'Basico')+'"?')) return;
  const {data,error}=await sb.rpc('admin_set_plan',{admin_pwd:APWD,p_id:btn.dataset.id,p_plan:nuevo});
  if(error||!data||!data.ok) return;
  btn.className='plan-badge '+data.plan;
  btn.textContent=data.plan==='completo'?'Completo':'Basico';
}

async function toggleActivo(btn){
  const {data,error}=await sb.rpc('admin_toggle_activo',{admin_pwd:APWD,p_id:btn.dataset.id});
  if(error||!data) return;
  btn.className='btn-toggle '+(data.activo?'activo':'inactivo');
  btn.textContent=data.activo?'Activo':'Inactivo';
}

async function eliminarCliente(btn){
  if(!confirm('Eliminar a '+btn.dataset.nombre+'?\nEsta accion no se puede deshacer.')) return;
  const {data,error}=await sb.rpc('admin_delete_cliente',{admin_pwd:APWD,p_id:btn.dataset.id});
  if(!error&&data&&data.ok) cargarClientes();
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function _normalizeAvatarPhoto(dataUrl, callback){
  var img = new Image();
  img.onload = function(){
    var size = 320;
    var side = Math.min(img.width, img.height);
    var sx = (img.width - side) / 2;
    var sy = (img.height - side) / 2;
    var cv = document.createElement('canvas');
    cv.width = size; cv.height = size;
    var ctx = cv.getContext('2d');
    ctx.beginPath();
    ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
    ctx.closePath();
    ctx.clip();
    ctx.drawImage(img, sx, sy, side, side, 0, 0, size, size);
    callback(cv.toDataURL('image/png'));
  };
  img.src = dataUrl;
}

function cambiarFotoDemo(id, input){
  const file = input.files[0];
  if(!file) return;
  const cliente = CLIENTES.find(function(c){ return c.id===id; });
  if(!cliente) return;
  const reader = new FileReader();
  reader.onload = function(e){
    _normalizeAvatarPhoto(e.target.result, async function(fotoCircular){
      const {error} = await sb.rpc('client_update_profile',{p_id:id,p_nombre:cliente.nombre,p_ciudad:cliente.ciudad||'',p_whatsapp:cliente.whatsapp||'',p_email:cliente.email||'',p_foto:fotoCircular});
      if(error){ alert('No se pudo cambiar la foto.'); return; }
      cargarClientes();
    });
  };
  reader.readAsDataURL(file);
}

window.addEventListener('load',function(){
  document.getElementById('admin-pwd-input').addEventListener('keydown',function(e){ if(e.key==='Enter') adminLogin(); });
  const saved=sessionStorage.getItem('mk_admin');
  if(saved){ APWD=saved; cargarClientes().then(function(ok){ if(ok){ document.getElementById('login-wrap').style.display='none'; document.getElementById('panel').classList.add('visible'); } else { sessionStorage.removeItem('mk_admin'); } }); }
});
</script>
